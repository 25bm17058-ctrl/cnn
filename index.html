<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Dog Classifier</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center">

    <div class="bg-white/20 backdrop-blur-xl shadow-2xl rounded-3xl p-8 w-[430px] text-center">

        <h1 class="text-4xl font-bold text-white">
            🐱 Cat vs 🐶 Dog
        </h1>

        <p class="text-white mt-2 mb-8">
            Deep Learning Image Classifier
        </p>

        <form action="/predict" method="POST" enctype="multipart/form-data" class="space-y-6">

            <input
                type="file"
                name="image"
                accept="image/*"
                required
                class="block w-full text-white
                file:bg-white
                file:text-purple-700
                file:px-5
                file:py-2
                file:border-0
                file:rounded-lg
                file:font-semibold
                file:cursor-pointer
                cursor-pointer">

            <button
                type="submit"
                class="w-full bg-white text-purple-700 font-bold py-3 rounded-xl shadow-lg hover:scale-105 transition duration-300">
                Predict
            </button>

        </form>

        <!-- Uploaded Image -->
        {% if image %}

        <div class="mt-8">

            <img src="{{ image }}"
                class="w-72 h-72 object-cover rounded-2xl mx-auto border-4 border-white shadow-xl">

        </div>

        {% endif %}

        <!-- Prediction -->
        {% if prediction %}

        <div class="mt-8 bg-white rounded-2xl p-6 shadow-xl">

            <h2 class="text-xl font-semibold text-gray-700">
                Prediction
            </h2>

            <p class="text-4xl font-bold text-purple-700 mt-3">
                {{ prediction }}
            </p>

            <div class="mt-6">

                <p class="text-gray-700 font-semibold">
                    Confidence
                </p>

                <div class="w-full bg-gray-200 rounded-full h-4 mt-3 overflow-hidden">

                    <div
                        class="bg-green-500 h-4 rounded-full transition-all duration-700"
                        style="width: {{ confidence }}%;">
                    </div>

                </div>

                <p class="mt-3 text-2xl font-bold text-green-600">
                    {{ confidence }}%
                </p>

            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
